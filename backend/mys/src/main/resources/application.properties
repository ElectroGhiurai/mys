spring.application.name=mys
server.port=8080

# ── Database (H2 in-memory) ───────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:mys;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate ───────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ── Logging ───────────────────────────────────────────────────────────────
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ── JWT ───────────────────────────────────────────────────────────────────
# MUST be ≥ 32 chars (256 bits) for HS256. Override via env variable in production.
app.jwt.secret=${JWT_SECRET:change-this-to-a-long-random-secret-in-production}
